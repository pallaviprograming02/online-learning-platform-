<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnHub - Online Learning Platform</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo">LearnHub</h1>
            <nav>
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#courses">Courses</a></li>
                    <li><a href="#about">About</a></li>
                </ul>
            </nav>
            <button class="btn primary-btn">Sign In</button>
        </div>
    </header>

    <section id="home" class="hero">
        <div class="container">
            <div class="hero-content">
                <h2>Unlock Your Potential with LearnHub</h2>
                <p>Discover thousands of online courses from top instructors and industry experts.</p>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search for courses...">
                    <button id="searchBtn" class="btn primary-btn">Search</button>
                </div>
            </div>
        </div>
    </section>

    <section id="courses" class="courses-section">
        <div class="container">
            <h2>Featured Courses</h2>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="programming">Programming</button>
                <button class="filter-btn" data-filter="design">Design</button>
                <button class="filter-btn" data-filter="business">Business</button>
            </div>
            <div id="courseList" class="course-grid">
                <!-- Courses will be dynamically injected here via JS -->
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 LearnHub. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
